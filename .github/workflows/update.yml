name: Steelwatch update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect jobs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scraper.py
      - name: Commit updated data
        run: |
          git config user.name  "steelwatch-bot"
          git config user.email "actions@github.com"
          git add jobs.json data/seen.json
          git commit -m "Update jobs $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
